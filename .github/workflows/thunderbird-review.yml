name: Thunderbird review checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review-suite:
    name: Complete local review suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run complete review suite
        run: npm run test:review

  webext-linter:
    name: Thunderbird webext-linter
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install current Thunderbird webext-linter main
        run: npm run webext-linter:update

      - name: Verify webext-linter dependency safety
        run: npm run webext-linter:audit

      - name: Run Thunderbird webext-linter
        run: npm run webext-linter:check
